site_name: Crossfire
site_url: https://lumen-argus.github.io/crossfire
site_description: Regex rule overlap analyzer for DLP, secret scanning, SAST, YARA, and IDS tools
repo_url: https://github.com/lumen-argus/crossfire
repo_name: lumen-argus/crossfire

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - tables
  - toc:
      permalink: true
  - attr_list
  - def_list

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - User Guide:
      - Commands: guide/commands.md
      - Supported Formats: guide/formats.md
      - Use Cases: guide/use-cases.md
      - Output Formats: guide/output.md
      - Configuration: guide/configuration.md
  - Reference:
      - CLI Options: reference/cli.md
      - Relationship Types: reference/relationships.md
      - Quality Metrics: reference/quality.md
  - CI Integration:
      - GitHub Action: ci/github-action.md
      - Pre-commit: ci/pre-commit.md
      - Generic CI: ci/generic.md
  - Development:
      - Contributing: development/contributing.md
      - Architecture: development/architecture.md
      - Changelog: changelog.md
